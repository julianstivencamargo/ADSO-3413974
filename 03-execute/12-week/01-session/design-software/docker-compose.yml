services:
  db:
    image: postgres:16-alpine
    container_name: sena-horarios-db
    environment:
      POSTGRES_DB: sena_horarios
      POSTGRES_USER: sena
      POSTGRES_PASSWORD: sena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sena -d sena_horarios"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api
    container_name: sena-horarios-api
    environment:
      DATABASE_URL: postgres://sena:sena@db:5432/sena_horarios?sslmode=disable
      CORS_ORIGIN: http://localhost:5173
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
    container_name: sena-horarios-web
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:

